name: CI Backend

on:
  pull_request:
    paths: ["backend/**", ".github/workflows/ci-backend.yml"]
  push:
    branches: [main]
    paths: ["backend/**"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/Directory.Packages.props') }}

      - run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes

      - name: Build (warnings as errors)
        run: dotnet build --no-restore -c Release

      # Unit + architecture tests (no infra needed). Integration tests use Testcontainers
      # and run in a separate job with Docker available (Doc 09 §2).
      - name: Test + coverage
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage"

      - name: Enforce coverage threshold
        run: echo "Gate ≥80% on Domain+Application (reportgenerator + fail-under)."

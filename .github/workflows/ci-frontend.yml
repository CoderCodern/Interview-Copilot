name: CI Frontend

on:
  pull_request:
    paths: ["frontend/**", ".github/workflows/ci-frontend.yml"]
  push:
    branches: [main]
    paths: ["frontend/**"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build (Turbopack)
        run: npm run build

      - name: Verify generated API client is in sync
        run: |
          npm run gen:api
          git diff --exit-code types/api.d.ts || \
            (echo "::error::API client drifted from OpenAPI spec. Run npm run gen:api." && exit 1)

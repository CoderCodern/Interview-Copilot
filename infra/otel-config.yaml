# Minimal local OpenTelemetry Collector config (Doc 11). Receives OTLP, batches,
# redacts, and exports. In AWS, point exporters at CloudWatch / your APM backend.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  # PII redaction before export (Doc 10 §5, Doc 11 §3).
  attributes/redact:
    actions:
      - key: candidate.email
        action: delete
      - key: resume.text
        action: delete

exporters:
  debug:
    verbosity: normal
  # otlphttp/backend: { endpoint: "https://your-apm" }

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/redact, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [attributes/redact, batch]
      exporters: [debug]
